---
# This role:
#   1. Installs stock Caddy from apt (for user, systemd unit, /etc/caddy dirs)
#   2. Installs a pinned Go from the official tarball
#   3. Builds a custom Caddy (with caddy-ratelimit) to /usr/local/bin/caddy via xcaddy
#   4. Overrides the systemd unit to run the custom binary — apt upgrades of the
#      stock caddy package will not clobber our build
#   5. Drops a Caddyfile enforcing per-IP rate limits + request body caps
#   6. Installs fail2ban with a jail that watches Caddy's JSON access log for 429/413

- name: Validate role inputs
  assert:
    that:
      - site_domain is defined and site_domain | length > 0
      - (upstream is defined) != (root_dir is defined)
    fail_msg: "Set site_domain and exactly one of upstream / root_dir."

- name: Install Caddy apt repo key
  apt_key:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    state: present

- name: Add Caddy apt repo
  apt_repository:
    repo: deb https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main
    state: present

- name: Install Caddy (provides user, systemd unit, dirs) + build deps
  apt:
    name:
      - caddy
      - git
      - libcap2-bin
    state: present
    update_cache: yes

- name: Check installed Go version
  command: /usr/local/go/bin/go version
  register: go_installed
  changed_when: false
  failed_when: false

- name: Install Go {{ go_version }} from official tarball
  when: "'go' + go_version not in go_installed.stdout"
  block:
    - name: Download Go tarball
      get_url:
        url: "https://go.dev/dl/go{{ go_version }}.linux-{{ go_arch }}.tar.gz"
        dest: /tmp/go.tar.gz
        mode: "0644"

    - name: Remove any previous Go install
      file:
        path: /usr/local/go
        state: absent

    - name: Extract Go
      unarchive:
        src: /tmp/go.tar.gz
        dest: /usr/local
        remote_src: yes

    - name: Remove Go tarball
      file:
        path: /tmp/go.tar.gz
        state: absent

- name: Install xcaddy
  shell: /usr/local/go/bin/go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
  environment:
    GOBIN: /usr/local/bin
    PATH: "/usr/local/go/bin:{{ ansible_env.PATH }}"
  args:
    creates: /usr/local/bin/xcaddy

- name: Check if custom Caddy already has rate_limit module
  command: "{{ caddy_custom_bin }} list-modules"
  register: caddy_modules
  changed_when: false
  failed_when: false

- name: Build custom Caddy with caddy-ratelimit
  shell: |
    set -e
    /usr/local/bin/xcaddy build \
      --with github.com/mholt/caddy-ratelimit \
      --output {{ caddy_custom_bin }}.new
    mv {{ caddy_custom_bin }}.new {{ caddy_custom_bin }}
    chmod +x {{ caddy_custom_bin }}
    setcap cap_net_bind_service=+ep {{ caddy_custom_bin }}
  environment:
    PATH: "/usr/local/bin:/usr/local/go/bin:{{ ansible_env.PATH }}"
  when: "'http.handlers.rate_limit' not in caddy_modules.stdout"
  notify: Restart Caddy

- name: Ensure systemd drop-in directory for Caddy
  file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: "0755"

- name: Override Caddy systemd unit to use custom binary
  copy:
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: "0644"
    content: |
      [Service]
      ExecStart=
      ExecStart={{ caddy_custom_bin }} run --environ --config /etc/caddy/Caddyfile
      ExecReload=
      ExecReload={{ caddy_custom_bin }} reload --config /etc/caddy/Caddyfile --force
      ReadWritePaths=/var/log/caddy
  notify: Restart Caddy

- name: Ensure Caddy log dir
  file:
    path: /var/log/caddy
    state: directory
    owner: caddy
    group: caddy
    mode: "0750"
    recurse: yes

- name: Ensure Caddy access log file is owned by caddy
  file:
    path: /var/log/caddy/access.log
    state: touch
    owner: caddy
    group: caddy
    mode: "0640"
    modification_time: preserve
    access_time: preserve

- name: Write Caddyfile
  template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    mode: "0644"
    validate: "{{ caddy_custom_bin }} validate --config %s --adapter caddyfile"
  notify: Restart Caddy

- name: Apply pending Caddy restarts before enable check
  meta: flush_handlers

- name: Enable Caddy
  systemd:
    name: caddy
    state: started
    enabled: yes
    daemon_reload: yes

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Install Caddy fail2ban filter
  copy:
    src: caddy-ratelimit.conf
    dest: /etc/fail2ban/filter.d/caddy-ratelimit.conf
    mode: "0644"
  notify: Restart fail2ban

- name: Install Caddy fail2ban jail
  template:
    src: caddy-ratelimit.local.j2
    dest: /etc/fail2ban/jail.d/caddy-ratelimit.local
    mode: "0644"
  notify: Restart fail2ban

- name: Enable fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: yes
